<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone papper scissor</title>
   <style>

    *{
    margin: 0;
    padding: 0;
    text-align: center;
 }

 body{
  background-color: rgb(48, 102, 123);
 }

 h1{
    background-color: #081b31;
    color: white;
    height:5rem;
    line-height: 5rem;
}
.choice {
  height: 165px;
  width: 165px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.choice:hover {
  cursor: pointer;
  background-color: #081b31;
}

img {
  height: 150px;
  width: 150px;
  object-fit: cover;
  border-radius: 50%;
}

.choices {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 3rem;
  margin-top: 5rem;
}

.score-board {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  margin-top: 3rem;
  gap: 5rem;
}

#user-score,
#comp-score {
  font-size: 4rem;
}

.msg-container {
  margin-top: 5rem;
}

#msg {
  background-color: #081b31;
  color: #fff;
  font-size: 2rem;
  display: inline;
  padding: 1rem;
  border-radius: 1rem;
}
   </style>
</head>
<body>
    <h1> Rock Paper scissors</h1>
    <div class="choices">
       <div class="choice" id="rock">
    <img src="./image.png" alt="">
        </div>
    <div class="choice" id="paper">
    <img src="./paper.png" alt="">
    </div>
     <div class="choice" id="scissors">
    <img src="./scissor.png" alt="">
     </div>
   </div>
   <div class="score-board">
    <div class="score">
        <p id="user-score"> 0</p>
        <p>User</p>
    </div>
     <div class="score">
        <p id="comp-score"> 0</p>
        <p>Comp</p>
    </div>
   </div>

   <div class="msg-container">
    <div id="msg"> Play your move</div>
   </div>
   <script src="script.js"></script>
   
</body>
</html>
